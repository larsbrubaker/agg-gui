<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>agg-gui — Rust GUI Framework</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0e0e10;
      color: #e0e0e0;
      font-family: system-ui, -apple-system, sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    header {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 10px 20px;
      background: #16161a;
      border-bottom: 1px solid #2a2a2f;
      flex-shrink: 0;
    }

    header h1 {
      font-size: 1.1rem;
      font-weight: 600;
      letter-spacing: 0.03em;
      color: #f0f0f0;
    }

    header h1 span { color: #6a9fea; }

    .badge {
      font-size: 0.7rem;
      padding: 2px 8px;
      background: #2a3a5a;
      color: #6a9fea;
      border-radius: 10px;
      border: 1px solid #3a5080;
    }

    .spacer { flex: 1; }

    header a {
      color: #888;
      text-decoration: none;
      font-size: 0.8rem;
    }

    header a:hover { color: #ccc; }

    /* Tab bar */
    .tabs {
      display: flex;
      gap: 2px;
      padding: 0 16px;
      background: #16161a;
      border-bottom: 1px solid #2a2a2f;
      flex-shrink: 0;
    }

    .tab {
      padding: 8px 18px;
      font-size: 0.85rem;
      color: #888;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: color 0.15s, border-color 0.15s;
      user-select: none;
    }

    .tab:hover { color: #ccc; }
    .tab.active { color: #e0e0e0; border-bottom-color: #6a9fea; }
    .tab.disabled { opacity: 0.4; cursor: not-allowed; }

    /* Canvas area */
    .canvas-wrap {
      flex: 1;
      display: flex;
      align-items: stretch;
      justify-content: stretch;
      overflow: hidden;
      position: relative;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
      image-rendering: pixelated;
    }

    #status {
      position: absolute;
      bottom: 12px;
      right: 16px;
      font-size: 0.72rem;
      color: #555;
      pointer-events: none;
    }

    #loading {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0e0e10;
      font-size: 0.9rem;
      color: #555;
    }

    #loading.hidden { display: none; }
  </style>
</head>
<body>
  <header>
    <h1>agg-<span>gui</span></h1>
    <span class="badge">Phase 1</span>
    <div class="spacer"></div>
    <a href="https://github.com/larsbrubaker/agg-gui" target="_blank">GitHub</a>
  </header>

  <div class="tabs">
    <div class="tab active" data-tab="basics">Basics</div>
    <div class="tab disabled" data-tab="layout">Layout</div>
    <div class="tab disabled" data-tab="text">Text</div>
    <div class="tab disabled" data-tab="tree">Tree</div>
  </div>

  <div class="canvas-wrap">
    <canvas id="canvas"></canvas>
    <div id="loading">Loading WASM…</div>
    <div id="status"></div>
  </div>

  <script type="module" src="./public/dist/bundle.js"></script>
</body>
</html>
