<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/svg+xml" href="./public/favicon.svg">
  <title>agg-gui — Rust GUI Framework</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #1a1a1a;
      margin: 0;
      padding: 0;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }

    /* Canvas fills the entire viewport */
    .canvas-wrap {
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: stretch;
      justify-content: stretch;
      overflow: hidden;
      position: relative;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
      image-rendering: pixelated;
      /* Prevent the browser from eating touch events for its own
         gestures (scroll, pinch-to-zoom, double-tap-to-zoom).  Without
         this, mobile Safari / Chrome would handle pinch and the WASM
         side would never see it.  `none` means every touch is ours. */
      touch-action: none;
      -webkit-user-select: none;
      user-select: none;
    }

    #loading {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      align-items: center;
      justify-content: center;
      background: #f0f0f2;
      font-size: 0.9rem;
      color: #9ca3af;
    }

    .spinner {
      width: 2rem;
      height: 2rem;
      border: 3px solid #d1d5db;
      border-top-color: #6b7280;
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    #loading.hidden { display: none; }
  </style>
</head>
<body>
  <div class="canvas-wrap">
    <canvas id="canvas" tabindex="0"></canvas>
    <div id="loading" role="status" aria-live="polite">
      <div class="spinner" aria-hidden="true"></div>
      <div id="loading-text">Loading WASM…</div>
    </div>
  </div>

  <!-- WebRTC signaling for the Screen Share demo (receiver + ?host= sender). -->
  <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
  <script type="module" src="./public/dist/bundle.js"></script>
</body>
</html>
