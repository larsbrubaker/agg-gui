<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/svg+xml" href="./public/favicon.svg">
  <title>agg-gui — Rust GUI Framework</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #1a1a1a;
      margin: 0;
      padding: 0;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }

    /* Canvas fills the entire viewport */
    .canvas-wrap {
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: stretch;
      justify-content: stretch;
      overflow: hidden;
      position: relative;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
      image-rendering: pixelated;
    }

    #loading {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f0f0f2;
      font-size: 0.9rem;
      color: #9ca3af;
    }

    #loading.hidden { display: none; }
  </style>
</head>
<body>
  <div class="canvas-wrap">
    <canvas id="canvas" tabindex="0"></canvas>
    <div id="loading">Loading WASM…</div>
  </div>

  <script type="module" src="./public/dist/bundle.js"></script>
</body>
</html>
