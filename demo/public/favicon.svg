<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- agg-gui logo: stylised GUI window with a bold lowercase "a" inside -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#4a90e2"/>
      <stop offset="1" stop-color="#2f6fc4"/>
    </linearGradient>
  </defs>
  <!-- Outer rounded window -->
  <rect x="4" y="4" width="56" height="56" rx="10" ry="10" fill="url(#bg)"/>
  <!-- Title bar -->
  <rect x="4" y="4" width="56" height="10" rx="10" ry="10" fill="#1f4e8c"/>
  <rect x="4" y="10" width="56" height="4" fill="#1f4e8c"/>
  <!-- Traffic-light dots -->
  <circle cx="10" cy="9" r="1.6" fill="#ff5f57"/>
  <circle cx="15" cy="9" r="1.6" fill="#febc2e"/>
  <circle cx="20" cy="9" r="1.6" fill="#28c840"/>
  <!-- Lowercase "a" mark -->
  <text x="32" y="50"
        text-anchor="middle"
        font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-weight="700"
        font-size="32"
        fill="#ffffff">a</text>
</svg>
